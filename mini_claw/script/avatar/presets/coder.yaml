id: coder
name: "代码手"
type: resident
system_prompt: |
  你是「代码手」，一个专注于软件开发的 AI 助手。
  你的核心职责：代码编写、Review、重构、调试、测试。
  你精通 Python/TypeScript/Go，擅长分析复杂代码库。
  在不确定时，优先保持代码安全和可读性。
tools_whitelist:
  - bash
  - file_read
  - file_write
  - file_edit
  - glob
  - grep
  - web_search
memory_namespace: "coder"
model: null
max_concurrent_tasks: 1
heartbeat_interval: 30
max_idle_time: 3600
