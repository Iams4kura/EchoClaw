# Mini Claude 配置文件
# 复制为 settings.yaml 后填入实际值

llm:
  default_model: ""       # 模型名称，如 "MiniMax-M2.5"
  api_key: ""             # API 密钥，从模型提供商获取
  base_url: ""            # API 基础 URL，如 "https://dashscope.aliyuncs.com/compatible-mode/v1"
  temperature: 0.7        # 生成温度，0-1 之间，越高越随机
  max_tokens: 4096        # 单次生成最大 token 数

permissions:
  mode: "ask"             # 权限模式: "ask" = 每次询问, "auto" = 自动批准

ui:
  theme: "default"        # UI 主题
  show_git_status: true   # 是否显示 Git 状态

persistence:
  auto_save: true         # 是否自动保存会话
  sessions_dir: "config/sessions"  # 会话存储目录
  max_sessions: 50        # 最大保存会话数

# Web 搜索配置
# 也可通过环境变量 BAIDU_AI_SEARCH_API_KEY 设置
web_search:
  baidu_ai_search_api_key: ""  # 百度千帆 AI 搜索 API Key (https://cloud.baidu.com/doc/qianfan/s/Omh4su4s0)

